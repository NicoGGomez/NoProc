<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - NoProc</title>

    <link rel="icon" href="/assets/imgs/logo.png" type="image/png">
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    
    <div class="contenedor cont-registro">

        <div class="logo">
            <img src="../assets/imgs/logo.png" alt="Logo NoProc">
            <img src="../assets/imgs/logoNombre.png" alt="Nombre NoProc">
        </div>

        <div class="cont-titulo">
        <h1>Iniciar sesion</h1>
        </div>

        <form class="form-inicio" id="form-inicio" action="">
            <div class="cont-input">
                <label for="nombre-user">Ingresa tu mail</label>
                <input class="input" id="Nombre-user" type="email">
            </div>
            <div class="cont-input">
                <label for="pass-user">Ingresa tu contraseña</label>
                <input class="input" type="password">
            </div>
            <button class="btn" id="btn-inicio-sesion">Iniciar sesion</button>
        </form>

        <a href="../index.html">Crear una cuenta</a>

    </div>

</body>
</html>
